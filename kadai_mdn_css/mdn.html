<!DOCTYPE html>
<html>
<head>
    <style>
        /*プロパティtransformを使用して要素を回転させます。*/
        div {
            position: absokute;
            left: 50px;
            top: 50px;
            width: 150px;
            height: 150px;
            background-color: skyblue;
            transform: rotate(20deg);
            text-align: center;
            margin-top: 200px;
            margin-left: 200px;
        }
    </style>
</head>

<body>
    <div>
        回転します
    </div>
</body>
</html>
